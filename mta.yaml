_schema-version: "3.1"
ID: vendor-portal
version: 1.0.0
description: BRM Vendor Portal on SAP BTP

modules:

  # ── AppRouter (serves React SPA + proxies CAP API) ────────────────
  - name: vendor-portal-approuter
    type: approuter.nodejs
    path: approuter
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build-ui
      build-result: .
    parameters:
      disk-quota: 512M
      memory: 256M
    requires:
      - name: vendor-portal-xsuaa
      - name: vendor-portal-destination
      - name: cap-backend-api
        group: destinations
        properties:
          name: cap-backend
          url: ~{url}
          forwardAuthToken: true

  # ── CAP Node.js Service ────────────────────────────────────────────
  - name: vendor-portal-cap
    type: nodejs
    path: cap
    build-parameters:
      builder: custom
      commands:
        - npm install
        - node_modules/.bin/cds build --production
      build-result: gen/srv
    parameters:
      disk-quota: 512M
      memory: 512M
    provides:
      - name: cap-backend-api
        properties:
          url: ${default-url}
    requires:
      - name: vendor-portal-xsuaa
      - name: vendor-portal-hdi
      - name: vendor-portal-destination

  # ── HANA DB Deployer ───────────────────────────────────────────────
  - name: vendor-portal-db-deployer
    type: hdb
    path: cap/gen/db
    build-parameters:
      builder: custom
      commands:
        - npm pkg set engines.node=">=16"
      build-result: .
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: vendor-portal-hdi

resources:

  - name: vendor-portal-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  - name: vendor-portal-hdi
    type: org.cloudfoundry.managed-service
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: vendor-portal-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
